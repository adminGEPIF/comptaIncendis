<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador d'ID d'Incendi</title>

<style>
    /* Negre no pur (lleugerament gris/càlid) per al fons */
    body { 
        background-color: #1e1a1a; 
        color: #f2e6e6; 
        font-family: Arial, sans-serif; 
    }
    
    /* Un negre una mica més clar per al contenidor */
    .container { 
        background-color: #2b2222; 
        padding: 30px; 
        border-radius: 12px; 
        max-width: 420px; 
        margin: auto; 
        text-align: center; 
        margin-top: 50px; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    /* Títol més petit i en un vermell suau */
    h1 {
        color: #d9534f; /* Vermell no pur */
        font-size: 22px; /* Mida reduïda */
        margin-bottom: 25px;
    }

    /* Botó principal en vermell apagat */
    .btn {
        padding: 12px 25px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold;
        background-color: #b33939; /* Vermell fosc no pur */
        color: #ffffff; 
        transition: 0.2s; 
        font-size: 16px;
        width: 100%;
    }
    .btn:hover { 
        background-color: #cc4444; /* Vermell una mica més clar al passar el ratolí */
    }

    /* Botó de copiar amb vores vermelles */
    .copy-btn {
        padding: 6px 14px; 
        border: 2px solid #b33939; 
        background: transparent;
        color: #d9534f; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        margin-top: 15px;
        transition: 0.2s;
    }
    .copy-btn:hover { 
        background-color: #b33939; 
        color: #ffffff; 
    }

    /* Quadre del resultat */
    #resultat { 
        margin-top: 25px; 
        border: 2px solid #b33939; 
        padding: 15px; 
        border-radius: 10px; 
        display: none; 
        background-color: #241c1c; 
    }
    
    #pResultatExpedient {
        font-size: 26px; 
        font-family: monospace; 
        margin: 10px 0; 
        color: #ffffff;
    }

    #error { 
        color: #ff6666; 
        margin-top: 15px; 
        font-weight: bold; 
        font-size: 14px;
    }
</style>

</head>
<body>

<div class="container">
    <h1>Generador d'ID d'Incendi</h1>

    <button id="generarBtn" class="btn">GENERAR ID INCENDI</button>

    <div id="resultat">
        <h3 style="margin-top: 0; font-size: 16px; color: #d9534f;">ID Generat:</h3>
        <p id="pResultatExpedient"></p>
        <button id="copyBtn" class="copy-btn">Copiar</button>
    </div>

    <div id="error"></div>
</div>

<script>
const generarBtn = document.getElementById("generarBtn");
const resultatDiv = document.getElementById("resultat");
const pResultat = document.getElementById("pResultatExpedient");
const copyBtn = document.getElementById("copyBtn");
const errorDiv = document.getElementById("error");

generarBtn.addEventListener("click", async () => {
    errorDiv.textContent = "";
    resultatDiv.style.display = "none";
    generarBtn.textContent = "Generant...";
    generarBtn.disabled = true;

    try {
        // 1. GENERAR DATA ACTUAL (DDMMAAAA)
        const avui = new Date();
        const dd = String(avui.getDate()).padStart(2, '0');
        const mm = String(avui.getMonth() + 1).padStart(2, '0'); // Els mesos comencen a 0
        const aaaa = avui.getFullYear();
        
        const prefixData = `${dd}${mm}${aaaa}`; // Ex: 05112026
        const prefixComplet = `${prefixData}-I`; // Ex: 05112026-I

        // 2. OBTENIR TOKEN
        const tokenRes = await fetch(
            "https://www.arcgis.com/sharing/rest/oauth2/token?client_id=k0gInzwOWOcJVqoV&client_secret=2eb5e05c126243bc9bf9f706b87c0f45&grant_type=client_credentials&expiration=1440&f=json",
            { method: "POST" }
        );
        const tokenData = await tokenRes.json();
        if (!tokenData.access_token) throw new Error("Error d'autenticació amb ArcGIS.");
        const token = tokenData.access_token;

        // 3. CONSULTAR NOMÉS ELS REGISTRES D'AVUI (Utilitzant LIKE)
        const query = "https://services-eu1.arcgis.com/jukYmBukbIJBEB9m/arcgis/rest/services/survey123_b694a7838ce24539a6d6c55914af72ea/FeatureServer/0/query";

        const params = new URLSearchParams({
            where: `field_33 LIKE '${prefixComplet}%'`, // Només busca els que comencen per la data d'avui + "-I"
            outFields: "field_33",
            returnGeometry: false,
            f: "json",
            token: token
        });

        const fet = await fetch(query + "?" + params.toString());
        const data = await fet.json();

        if (data.error) throw new Error(data.error.message);

        // 4. CALCULAR EL NÚMERO CORRELATIU (XXX)
        let maxNumero = 0;

        // Si hi ha registres d'avui, busquem el número més alt
        if (data.features && data.features.length > 0) {
            data.features.forEach(f => {
                const idStr = f.attributes.field_33; // Ex: "05112026-I002"
                if (typeof idStr === "string" && idStr.includes(prefixComplet)) {
                    // Extraiem la part numèrica final separant pel prefix
                    const partFinal = idStr.split('-I')[1]; 
                    if (partFinal) {
                        const n = parseInt(partFinal, 10);
                        if (!isNaN(n) && n > maxNumero) {
                            maxNumero = n;
                        }
                    }
                }
            });
        }

        // 5. MUNTAR EL NOU ID
        const nouComptador = (maxNumero + 1).toString().padStart(3, "0");
        const nouID = `${prefixComplet}${nouComptador}`; // Resultat final: DDMMAAAA-IXXX

        // Mostrar a la pantalla
        pResultat.textContent = nouID;
        resultatDiv.style.display = "block";

    } catch (err) {
        console.error(err);
        errorDiv.textContent = "Error: " + err.message;
    }

    generarBtn.textContent = "GENERAR ID INCENDI";
    generarBtn.disabled = false;
});

// FUNCIÓ PER COPIAR AL PORTAPAPERS
copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(pResultat.textContent);
    copyBtn.textContent = "Copiat ✓";
    setTimeout(() => copyBtn.textContent = "Copiar", 2000);
});
</script>
</body>
</html>
